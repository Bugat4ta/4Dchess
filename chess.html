<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>4D Chess</title>
<style>
    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        background: #0f1117;
        color: white;
        font-family: Arial, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px;
    }

    h1 {
        margin-bottom: 10px;
    }

    p {
        max-width: 900px;
        text-align: center;
        color: #b0b0b0;
    }

    .game-container {
        display: grid;
        grid-template-columns: repeat(2, auto);
        gap: 40px;
        margin-top: 30px;
    }

    .timeline {
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    .timeline h2 {
        margin-bottom: 10px;
    }

    .board {
        display: grid;
        grid-template-columns: repeat(8, 70px);
        grid-template-rows: repeat(8, 70px);
        border: 4px solid white;
    }

    .square {
        width: 70px;
        height: 70px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 42px;
</html>
